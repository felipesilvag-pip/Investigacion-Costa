<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio de Investigación Costera - v7</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --secondary: #34495e; --accent: #3498db;
            --bg: #f4f7f6; --text: #333; --success: #27ae60;
            --warning: #8e44ad; --edit: #f39c12;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; text-align: center; }
        h2 { color: var(--primary); font-size: 1.2em; margin-bottom: 15px; }

        /* Formulario y Controles */
        .form-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; background: #eef2f3; padding: 20px; border-radius: 5px; border: 2px solid var(--accent); }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; grid-column: 1 / -1; justify-content: flex-end; }
        button { padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent); }
        .btn-update { background: var(--edit); display: none; }
        .btn-cancel { background: #95a5a6; display: none; }

        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 5px; border: 1px solid #eee; }
        .filter-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 15px; align-items: center; }

        /* Tabla */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        .tag-format { background: #e67e22; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .tag-avail { background: var(--success); color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .action-btns { display: flex; gap: 5px; }
        .btn-edit-row { background: var(--edit); padding: 5px 10px; font-size: 11px; }
        .btn-delete-row { background: #e74c3c; padding: 5px 10px; font-size: 11px; }
        
        /* Gráfico */
        #chart-container { height: 350px; position: relative; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="form-title">Repositorio de Investigación Costera</h1>
    <div class="form-section">
        <input type="text" id="fuente" placeholder="Fuente (ej. NOAA)">
        <input type="text" id="variable" placeholder="Variable (ej. SST)">
        <input type="text" id="resolucion" placeholder="Resolución (ej. 0.25°)">
        <input type="text" id="tiempo" placeholder="Tiempo (ej. 1980-2026)">
        <input type="text" id="espacio" placeholder="Espacio (ej. Global)">
        <select id="formato">
            <option value="nc">.nc (NetCDF)</option><option value="csv">.csv</option>
            <option value="txt">.txt / .dat</option><option value="xlsx">.xlsx</option>
        </select>
        <select id="disponibilidad">
            <option value="Abierto">Abierto</option><option value="Registro">Registro</option>
            <option value="Solicitud">Solicitud</option><option value="Privado">Privado</option>
        </select>
        <input type="url" id="url" placeholder="URL del dataset">
        <div class="btn-group">
            <button id="btn-cancel" class="btn-cancel" onclick="cancelEdit()">Cancelar</button>
            <button id="btn-update" class="btn-update" onclick="updateItem()">Actualizar Registro</button>
            <button id="btn-save" class="btn-save" onclick="addItem()">Guardar Nueva Entrada</button>
        </div>
    </div>

    <div class="controls">
        <div class="filter-row">
            <input type="text" id="searchInput" placeholder="Búsqueda global..." onkeyup="applyFilters()">
            <input type="text" id="filterRes" placeholder="Filtrar Resolución..." onkeyup="applyFilters()">
            <select id="filterFormat" onchange="applyFilters()">
                <option value="">Cualquier Formato</option><option value="nc">.nc</option>
                <option value="csv">.csv</option><option value="txt">.txt</option>
            </select>
            <select id="filterAvail" onchange="applyFilters()">
                <option value="">Cualquier Dispo.</option><option value="Abierto">Abierto</option>
                <option value="Registro">Registro</option><option value="Privado">Privado</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="backupData()" style="background: var(--success); font-size: 13px;">💾 Descargar Backup (JSON)</button>
            <label style="background: var(--warning); color: white; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 13px;">
                📂 Cargar Backup <input type="file" accept=".json" onchange="importData(event)" style="display: none;">
            </label>
        </div>
    </div>
</div>

<div class="container">
    <h2>Análisis de Cobertura Temporal</h2>
    <div id="chart-container"><canvas id="timelineChart"></canvas></div>
</div>

<div class="container">
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Fuente</th><th>Variable</th><th>Res.</th><th>Tiempo</th>
                    <th>Espacio</th><th>Fmt</th><th>Dispo</th><th>Enlace</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let items = [];
    let editingId = null;
    let timelineChart = null;

    async function loadData() {
        try {
            const response = await fetch('data.json');
            const remoteData = await response.json();
            const localData = JSON.parse(localStorage.getItem('coastalData_v3')) || [];
            const remoteIds = new Set(remoteData.map(i => i.id));
            items = [...remoteData, ...localData.filter(i => !remoteIds.has(i.id))];
            applyFilters();
        } catch (error) {
            items = JSON.parse(localStorage.getItem('coastalData_v3')) || [];
            applyFilters();
        }
    }

    function parseYears(tiempoStr) {
        const years = tiempoStr.split('-').map(y => parseInt(y.trim()));
        if (years.length === 2 && !isNaN(years[0]) && !isNaN(years[1])) return [years[0], years[1]];
        const singleYear = parseInt(tiempoStr);
        return !isNaN(singleYear) ? [singleYear, singleYear + 1] : null;
    }

    function updateTimelineChart(data) {
        const ctx = document.getElementById('timelineChart').getContext('2d');
        if (timelineChart) timelineChart.destroy();
        const chartData = data.map(item => {
            const range = parseYears(item.tiempo);
            return range ? { x: range, y: item.variable.split(',')[0].trim().toUpperCase() } : null;
        }).filter(item => item !== null);

        timelineChart = new Chart(ctx, {
            type: 'bar',
            data: { datasets: [{ label: 'Cobertura (Años)', data: chartData, backgroundColor: 'rgba(52, 152, 219, 0.7)' }] },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', position: 'bottom', min: Math.min(...chartData.map(d => d.x[0])) - 2 },
                    y: { ticks: { font: { size: 10 } } }
                }
            }
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = data.map(item => `
            <tr>
                <td><strong>${item.fuente}</strong></td><td>${item.variable}</td>
                <td>${item.resolucion}</td><td>${item.tiempo}</td><td>${item.espacio}</td>
                <td><span class="tag-format">${item.formato}</span></td>
                <td><span class="tag-avail">${item.disponibilidad}</span></td>
                <td><a href="${item.url}" target="_blank">Abrir</a></td>
                <td class="action-btns">
                    <button class="btn-edit-row" onclick="editItem(${item.id})">Editar</button>
                    <button class="btn-delete-row" onclick="deleteItem(${item.id})">X</button>
                </td>
            </tr>`).join('');
    }

    function applyFilters() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const res = document.getElementById('filterRes').value.toLowerCase();
        const fmt = document.getElementById('filterFormat').value;
        const avail = document.getElementById('filterAvail').value;

        const filtered = items.filter(i => 
            Object.values(i).some(v => String(v).toLowerCase().includes(query)) &&
            i.resolucion.toLowerCase().includes(res) &&
            (fmt === "" || i.formato === fmt) &&
            (avail === "" || i.disponibilidad === avail)
        );
        renderTable(filtered);
        updateTimelineChart(filtered);
    }

    function addItem() {
        const item = getFormData();
        if(item.fuente && item.url) { items.push(item); saveAndRender(); clearForm(); }
    }

    function editItem(id) {
        const item = items.find(i => i.id === id);
        if(!item) return;
        editingId = id;
        ['fuente', 'variable', 'resolucion', 'tiempo', 'espacio', 'url'].forEach(f => document.getElementById(f).value = item[f]);
        document.getElementById('formato').value = item.formato;
        document.getElementById('disponibilidad').value = item.disponibilidad;
        document.getElementById('btn-save').style.display = 'none';
        document.getElementById('btn-update').style.display = 'block';
        document.getElementById('btn-cancel').style.display = 'block';
        document.getElementById('form-title').innerText = "Editando Registro...";
        window.scrollTo(0,0);
    }

    function updateItem() {
        const idx = items.findIndex(i => i.id === editingId);
        if(idx !== -1) { items[idx] = { ...getFormData(), id: editingId }; saveAndRender(); cancelEdit(); }
    }

    function cancelEdit() {
        editingId = null; clearForm();
        document.getElementById('btn-save').style.display = 'block';
        document.getElementById('btn-update', 'btn-cancel').forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('form-title').innerText = "Repositorio de Investigación Costera";
    }

    function getFormData() {
        return {
            id: editingId || Date.now(),
            fuente: document.getElementById('fuente').value.trim(),
            variable: document.getElementById('variable').value.trim(),
            resolucion: document.getElementById('resolucion').value.trim(),
            tiempo: document.getElementById('tiempo').value.trim(),
            espacio: document.getElementById('espacio').value.trim(),
            formato: document.getElementById('formato').value,
            disponibilidad: document.getElementById('disponibilidad').value,
            url: document.getElementById('url').value.trim()
        };
    }

    function saveAndRender() { localStorage.setItem('coastalData_v3', JSON.stringify(items)); applyFilters(); }
    function clearForm() { ['fuente', 'variable', 'resolucion', 'tiempo', 'espacio', 'url'].forEach(id => document.getElementById(id).value = ''); }
    function backupData() {
        const blob = new Blob([JSON.stringify(items, null, 2)], { type: "application/json" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `backup_coastal.json`; a.click();
    }
    function importData(e) {
        const r = new FileReader();
        r.onload = (ev) => { items = JSON.parse(ev.target.result); saveAndRender(); };
        r.readAsText(e.target.files[0]);
    }

    loadData();
</script>
</body>
</html>
